name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r IPL-AI-Predictor/requirements.txt

      - name: Test FastAPI Import
        run: |
          cd IPL-AI-Predictor
          python -c "import main; print('FastAPI OK')"

      - name: Build Docker Image
        run: |
          cd IPL-AI-Predictor
          docker build -f Dockerfile.api -t ipl-api .